<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- MSPD favicon: trajectories diverging from a common origin at two scales -->
  <circle cx="256" cy="256" r="256" fill="#0e1a2b"/>

  <!-- Trunk from origin -->
  <path d="M256 432 L256 348"
        stroke="#e8eef5" stroke-width="34" stroke-linecap="round" fill="none"/>

  <!-- Left main branch + its two sub-branches (teal lineage) -->
  <path d="M256 348 C 220 320, 180 300, 150 250"
        stroke="#3ec3c8" stroke-width="30" stroke-linecap="round" fill="none"/>
  <path d="M150 250 C 130 215, 110 190, 96 150"
        stroke="#3ec3c8" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M150 250 C 165 210, 180 180, 200 142"
        stroke="#3ec3c8" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- Right main branch + its two sub-branches (amber lineage) -->
  <path d="M256 348 C 292 320, 332 300, 362 250"
        stroke="#f5b942" stroke-width="30" stroke-linecap="round" fill="none"/>
  <path d="M362 250 C 347 210, 332 180, 312 142"
        stroke="#f5b942" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M362 250 C 382 215, 402 190, 416 150"
        stroke="#f5b942" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- Origin dot -->
  <circle cx="256" cy="432" r="26" fill="#e8eef5"/>

  <!-- Endpoint dots -->
  <circle cx="96"  cy="150" r="22" fill="#3ec3c8"/>
  <circle cx="200" cy="142" r="22" fill="#3ec3c8"/>
  <circle cx="312" cy="142" r="22" fill="#f5b942"/>
  <circle cx="416" cy="150" r="22" fill="#f5b942"/>
</svg>
